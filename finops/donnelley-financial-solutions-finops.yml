description: FOCUS-aligned FinOps shape for DFIN. Billing is enterprise contract per product (ActiveDisclosure,
  Venue, Arc Suite); per-API-call pricing is not published.
notes: No public per-meter billing; reconciled=false.
sources:
  - https://www.dfinsolutions.com/
  - https://www.dfinsolutions.com/about
billingModel:
  pricingCategory: Enterprise Contract
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
focusColumns:
  ServiceName: DFIN ActiveDisclosure / Venue / Arc Suite
  ServiceCategory: Financial Regulatory / Compliance Software
  ProviderName: Donnelley Financial Solutions
  PublisherName: Donnelley Financial Solutions, LLC
  InvoiceIssuerName: Donnelley Financial Solutions, LLC
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: contract_seats
    description: Active named users under the DFIN contract
    unit: seat
    aggregation: count
    dimensions:
      - product
  - name: filings
    description: SEC filings or disclosure documents processed
    unit: document
    aggregation: count
    dimensions:
      - product
      - filing_type
  - name: data_room_storage
    description: Storage consumed by Venue data rooms
    unit: GB-month
    aggregation: avg
    dimensions:
      - data_room
principles:
  - name: Visibility
    description: Reconcile the DFIN enterprise invoice against contracted seats, filings, and Venue data-room
      storage; per-API-call usage is not invoiced.
  - name: Allocation
    description: Allocate DFIN cost to the legal/compliance team or deal team owning the SEC filing or
      M&A data room.
  - name: Optimization
    description: Right-size data-room scope; archive completed deal rooms; reuse ActiveDisclosure templates
      across recurring filings.
  - name: Accountability
    description: Compliance / corporate-secretary function owns DFIN spend and contract renewal.
maintainers:
